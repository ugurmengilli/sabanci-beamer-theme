name: "Retarget PR to Develop"

on:
  pull_request_target:
    types: [opened]

jobs:
  retarget:
    runs-on: ubuntu-latest
    # Only run if the PR is targeting the default 'main' branch
    if: github.event.pull_request.base.ref == 'main'
    permissions:
      pull-requests: write
    steps:
      - name: "Retarget PR to develop branch"
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              base: 'develop'  // Change this to your preferred PR branch name
            });
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "🤖 **Auto-Retarget**: This PR was automatically moved from `main` to the `develop` branch."
            });
